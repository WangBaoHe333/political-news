version: '3.8'

services:
  political-news:
    build: .
    container_name: political-news
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/political_news.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUTO_SYNC_ON_STARTUP=0
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 可选：添加Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: political-news-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - political-news
    networks:
      - political-news-network

networks:
  political-news-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: