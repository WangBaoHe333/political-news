# 生产环境Docker Compose配置
# 使用: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  political-news:
    build: .
    container_name: political-news-prod
    restart: unless-stopped
    # 生产环境不暴露端口，由Nginx反向代理
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://political_user:${POSTGRES_PASSWORD}@postgres:5432/political_news
      - AUTO_SYNC_ON_STARTUP=0
      - BOOTSTRAP_RECENT_NEWS_ON_STARTUP=1
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 生产环境资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  postgres:
    image: postgres:15-alpine
    container_name: political-news-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=political_news
      - POSTGRES_USER=political_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U political_user -d political_news"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 生产环境资源限制
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.15'

  nginx:
    image: nginx:alpine
    container_name: political-news-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - political-news
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 生产环境资源限制
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
        reservations:
          memory: 64M
          cpus: '0.1'

volumes:
  postgres-data:
    driver: local

networks:
  default:
    name: political-news-network
    driver: bridge
